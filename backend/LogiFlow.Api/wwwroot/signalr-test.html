<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>LogiFlow SignalR Test</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 24px;
            background: #111827;
            color: #f9fafb;
        }

        .status {
            margin-bottom: 16px;
            font-weight: 600;
        }

        pre {
            background: #1f2937;
            padding: 16px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<h1>LogiFlow SignalR Test</h1>

<div class="status" id="status">Connecting...</div>

<h2>VehiclePositionUpdated</h2>
<pre id="messages"></pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>

<script>
    const statusElement = document.getElementById("status");
    const messagesElement = document.getElementById("messages");

    const latestUpdatesByDeliveryId = {};

    const connection = new signalR.HubConnectionBuilder()
        .withUrl("/hubs/tracking")
        .withAutomaticReconnect()
        .build();

    connection.on("VehiclePositionUpdated", (update) => {
        latestUpdatesByDeliveryId[update.deliveryId] = {
            ...latestUpdatesByDeliveryId[update.deliveryId],
            position: update,
            receivedAt: new Date().toLocaleTimeString()
        }
        messagesElement.textContent = JSON.stringify(latestUpdatesByDeliveryId, null, 2);
    });

    connection.on("DeliveryStateChanged", (update) => {
        latestUpdatesByDeliveryId[update.deliveryId] = {
            ...latestUpdatesByDeliveryId[update.deliveryId],
            stateChanged: update,
            receivedAt: new Date().toLocaleTimeString()
        };
        messagesElement.textContent = JSON.stringify(latestUpdatesByDeliveryId, null, 2);
    });

    connection.on("DeliveryEventCreated", (event) => {
        latestUpdatesByDeliveryId[event.deliveryId] = {
            ...latestUpdatesByDeliveryId[event.deliveryId],
            lastEvent: event,
            receivedAt: new Date().toLocaleTimeString()
        };
        messagesElement.textContent = JSON.stringify(latestUpdatesByDeliveryId, null, 2);
    });

    connection.start()
        .then(() => {
            statusElement.textContent = "Connected to SignalR";
            statusElement.style.color = "#22c55e";
        })
        .catch((error) => {
            statusElement.textContent = "Connection failed: " + error;
            statusElement.style.color = "#ef4444";
        });
</script>
</body>
</html>
